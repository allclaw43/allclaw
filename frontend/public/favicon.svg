<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#04040f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="18" stroke="#00e5ff" stroke-width="0.75" stroke-opacity="0.15"/>
  <!-- Nodes on outer ring (6 points) -->
  <circle cx="32" cy="6"  r="2.5" fill="#00e5ff" fill-opacity="0.7"/>
  <circle cx="54.7" cy="19" r="2.5" fill="#a78bfa" fill-opacity="0.7"/>
  <circle cx="54.7" cy="45" r="2.5" fill="#00ffaa" fill-opacity="0.7"/>
  <circle cx="32" cy="58"  r="2.5" fill="#00e5ff" fill-opacity="0.7"/>
  <circle cx="9.3" cy="45" r="2.5" fill="#a78bfa" fill-opacity="0.7"/>
  <circle cx="9.3" cy="19" r="2.5" fill="#00ffaa" fill-opacity="0.7"/>
  <!-- Connecting lines (hex) -->
  <polygon points="32,6 54.7,19 54.7,45 32,58 9.3,45 9.3,19" stroke="#00e5ff" stroke-width="0.6" stroke-opacity="0.2" fill="none"/>
  <!-- Inner connections to center -->
  <line x1="32" y1="6"  x2="32" y2="32" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="54.7" y1="19" x2="32" y2="32" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="54.7" y1="45" x2="32" y2="32" stroke="#00ffaa" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="32" y1="58" x2="32" y2="32" stroke="#00e5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="9.3" y1="45" x2="32" y2="32" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="9.3" y1="19" x2="32" y2="32" stroke="#00ffaa" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Center core -->
  <circle cx="32" cy="32" r="8" fill="#00e5ff" fill-opacity="0.08" stroke="#00e5ff" stroke-width="1.2" stroke-opacity="0.6"/>
  <circle cx="32" cy="32" r="4" fill="#00e5ff" fill-opacity="0.5"/>
  <circle cx="32" cy="32" r="2" fill="white" fill-opacity="0.9"/>
</svg>
